<!DOCTYPE html>
<html lang="zh-cn">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册</title>
  <link rel="stylesheet" href="../css/normalize.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/logon.css" />
  <style>
  </style>
</head>

<body>
  <!-- 头部 -->
  <div class="head clearfix">
    <div class="container">
      <!-- log 左 -->
      <div class="fl head-l">
        <a href="../pages/home.html">
          <img src="../images/logo-white.png" alt="" />
        </a>
      </div>
      <!-- 右部 -->
      <div class="fr head-r">
        已有源码帐号，
        <a href="../pages/langding.html">立即登录</a>
      </div>
    </div>
  </div>

  <!-- 注册 -->
  <div class="logon-bg">
    <div class="logon container">
      <div class="logon-in">
        <h2>欢迎注册</h2>
        <h3>百款接口免费试用</h3>
        <p class="gift">
          <a href="">注册就送300元大礼包</a>
        </p>

        <div class="js">
          <input class="input" type="text" placeholder="用户名(6~20位字母数字)" />
          <img src="../images/clearInput.png" alt="">
          <p>
            <span></span>
            昵称须在6~12位字母数字间
          </p>
        </div>
        <div class="js">
          <input class="input" type="text" placeholder="请输入手机号" />
          <img src="../images/clearInput.png" alt="">
          <p>
            <span></span>
            请输入正确的手机号
          </p>
        </div>
        <div class="testing clearfix js">
          <input class="fl input" type="text" placeholder="请输入手机验证码" />
          <img src="../images/clearInput.png" alt="">
          <button class="fr" type="button">获取验证码</button>
          <p>
            <span></span>
            请输入4位验证码
          </p>
        </div>

        <div class="js">
          <input class="input" type="password" placeholder="请输入6~12位的密码" />
          <img src="../images/clearInput.png" alt="">
          <p>
            <span></span>
            请输入6至12位的密码
          </p>
        </div>
        <div class="know">
          <input type="checkbox" name="" id="" />我已阅读并接受
          <a href="">《源码用户服务协议》</a>
          <a href="">《源码隐私政策》</a>
        </div>

        <button class="btn"><a href="../pages/home.html">立即注册</a></button>
      </div>
    </div>
  </div>
  <script src="../js/logon.js"></script>
</body>

</html>
