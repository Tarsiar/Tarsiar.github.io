<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录框</title>
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/langding.css">


</head>

<body>
    <!-- 登录模态框 -->
    <div class="moder clearfix">
        <!-- 左边 -->
        <div class="moder-l fl">
            <img src="../images/login-bg.png" alt="">
        </div>
        <!-- 右边 -->

        <div class="moder-r fr">
            <div class="moder-in">
                <p>
                    <img src="../images/loginlogo.png" alt="">
                </p>
               
                <div class="landing">
                    <span class="lands active">账号登录</span>
                    <span class="interval">|</span>
                    <span class="lands">扫码登录</span>
                </div>


                <div class="infor tab">
                    <div class="text">
                        <input type="text" placeholder="用户名/手机号/邮箱">
                        <img src="../images/clearInput.png" alt="">
                    </div>
                    <div class="passw">
                        <input type="password" placeholder="密码">
                        <img src="../images/clearInput.png" alt="">
                    </div>
                    <p class="forget">
                        <a href="">忘记密码</a>
                    </p>
                    <button class="btn">登录</button>
                    <p class="last">
                        <span>还没有源码账号，</span>
                      <span><a href="../pages/logon.html">立即注册</a></span>  
                    </p>
                </div>

                <div class="account  tab">
                    <div class="qrcode">
                        <img src="../images/showqrcode.jpg" alt="">
                        <p>扫码关注</p>
                        <span>未关注源码科技公众号，请先关注后再登录</span>
                    </div>
                    <p >
                        还没有源码账号，
                        <a href="../pages/logon.html">立即注册</a>
                        <span></span>
                    </p>
                </div>
               
               
            </div>
        </div>
    </div>
    <script src="../js/langding.js"></script>
</body>

</html>
